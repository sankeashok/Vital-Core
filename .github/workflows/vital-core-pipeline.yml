name: 🚀 Vital-Core CI/CD Continuous Integration Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-test:
    name: 🔍 Code Quality & Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.9 Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: 📦 Install Package Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx black flake8

      - name: 🎨 Code Formatting Check (Black)
        run: |
          black --check --diff src/ tests/ || echo "Formatting issues identified but continuing pipeline execution."

      - name: 🔍 Linting Inspection (Flake8)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,env,.git,__pycache__

      - name: 🧪 Execute Automated Pytest Suite
        env:
          APP_ENV: testing
          HF_MODEL_ID: Qwen/Qwen2.5-Coder-32B-Instruct
        run: |
          python -m pytest -v

  container-build:
    name: 🐳 Docker Container Verification
    runs-on: ubuntu-latest
    needs: quality-and-test
    
    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Local Docker Verification Image
        run: |
          docker build -t vital-core:test .
          docker images | grep vital-core
          echo "✅ Docker verification container built successfully!"

  auto-merge-to-main:
    name: 🔄 Auto-merge to Main Branch
    runs-on: ubuntu-latest
    needs: [quality-and-test, container-build]
    if: startsWith(github.ref, 'refs/heads/feature/') && success()
    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Auto-merge to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main
          git merge origin/${{ github.ref_name }} --no-edit || {
            echo "Auto-merge conflicts. Merging aborted."
            git merge --abort || true
            exit 1
          }
          git push origin main

  deploy-to-huggingface:
    name: 🤗 Sync to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: [quality-and-test, container-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: 🤗 Push to HF Space Git Remote
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add hf https://sankeashook:$HF_TOKEN@huggingface.co/spaces/sankeashook/Vital-Core || true
          git push --force hf HEAD:main

